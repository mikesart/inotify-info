---
name: test
on:
  push:
  pull_request:
concurrency:
  # Cancels pending runs when a PR gets updated.
  group: ${{ github.head_ref || github.run_id }}-${{ github.actor }}
  cancel-in-progress: true
jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y make clang-format
      - run: make lint
      - run: git diff --exit-code

  build-with-gcc:
    strategy:
      matrix:
        cfg: [debug, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - run: sudo apt-get install -y build-essential
      - run: make VERBOSE=1 CFG=${{ matrix.cfg}} -j$(nproc)
      - run: |
          _${{ matrix.cfg }}/inotify-info --version
          _${{ matrix.cfg }}/inotify-info

  build-with-zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1
      - run: |
          make VERBOSE=1 -j$(nproc) \
            CC="zig cc -target $(uname -m)-linux-musl" \
            CXX="zig c++ -target $(uname -m)-linux-musl"
      - run: |
          _release/inotify-info --version
          _release/inotify-info

  build-with-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t inotify-info .
      - run: docker run --rm --privileged -v /proc:/proc inotify-info
